# ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ts-ui-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: ts-ui.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ts-ui-server  # Route directly to your backend service
                port:
                  number: 8050      # Target the backend's port